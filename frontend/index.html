<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- unsafe-eval is required for plugin inline JS (new Function). Plugin code
         now runs in a Worker realm (plugins/sandbox.worker.ts, SEC-1) with no DOM
         and no electronAPI bridge, so eval there cannot reach files/UI; the policy
         also governs that Worker, so connect-src below is its only network egress.
         connect-src is restricted to same-origin + the local backend (no wildcard
         exfil channel, ENV-1); remote plugin fetch/install is removed (SEC-2).
         img-src no longer permits arbitrary remote hosts (tracking pixels). -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 ws://localhost:5173 ws://127.0.0.1:5173; img-src 'self' data:;" />
    <title>NexusGraph</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
